name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    container:
      image: node:22
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type Check
        run: pnpm exec tsc -b

      - name: Build
        run: pnpm build

      - name: Unit & Integration Tests
        run: pnpm test

      # TODO: OpenAPI type freshness check
      # Uncomment when backend CI produces openapi.json artifact
      # - name: Check Generated Types
      #   run: pnpm test:types

      # E2E tests are not run on Gitea (no Playwright browser environment)
      # Run E2E on GitHub Actions instead
